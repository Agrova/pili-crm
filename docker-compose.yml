services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-pili_crm}
      POSTGRES_USER: ${DB_USER:-pili}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pili}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pili}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
